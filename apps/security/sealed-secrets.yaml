# Sealed Secrets Controller
# Gestion des secrets chiffrés dans Git
# Source: https://github.com/bitnami-labs/sealed-secrets
# Version: v0.27.3
#
# Installé via: kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.3/controller.yaml
# Le controller tourne dans kube-system
# La clé publique permet de chiffrer les secrets
# Seul le cluster peut déchiffrer avec la clé privée
