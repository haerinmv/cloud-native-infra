apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: ci-cd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 4.8.0
    helm:
      values: |
        driver:
          kind: modern_ebpf
        tty: true
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
