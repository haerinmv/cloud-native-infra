apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: ci-cd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.28.0
    helm:
      values: |
        server:
          standalone:
            enabled: true
          ui:
            enabled: true
            serviceType: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: security
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
