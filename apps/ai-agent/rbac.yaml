apiVersion: v1
kind: ServiceAccount
metadata:
  name: jarvis-sa
  namespace: ai-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jarvis-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "events", "namespaces", "nodes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jarvis-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jarvis-reader
subjects:
- kind: ServiceAccount
  name: jarvis-sa
  namespace: ai-agent
