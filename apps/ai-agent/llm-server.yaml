apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
    spec:
      containers:
      - name: llm-server
        image: ghcr.io/ggerganov/llama.cpp:server-b4553
        args:
          - "--model"
          - "/models/qwen.gguf"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--ctx-size"
          - "2048"
          - "--threads"
          - "4"
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: models
          mountPath: /models
      initContainers:
      - name: download-model
        image: curlimages/curl:latest
        command:
          - sh
          - -c
          - |
            if [ ! -f /models/qwen.gguf ]; then
              curl -L -o /models/qwen.gguf \
              "https://huggingface.co/Qwen/Qwen1.5-1.8B-Chat-GGUF/resolve/main/qwen1_5-1_8b-chat-q4_k_m.gguf"
            fi
        volumeMounts:
        - name: models
          mountPath: /models
        resources:
          limits:
            memory: "256Mi"
      volumes:
      - name: models
        emptyDir:
          sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: ai-agent
spec:
  selector:
    app: llm-server
  ports:
  - port: 8000
    targetPort: 8000
