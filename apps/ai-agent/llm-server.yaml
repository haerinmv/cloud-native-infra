apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-server
  namespace: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-server
  template:
    metadata:
      labels:
        app: llm-server
    spec:
      containers:
      - name: llm-server
        image: python:3.11-slim
        command:
          - sh
          - -c
          - |
            pip install llama-cpp-python[server] -q
            python3 -m llama_cpp.server --model /models/qwen.gguf --host 0.0.0.0 --port 8000 --n_ctx 2048 --n_threads 4
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: models
          mountPath: /models
      initContainers:
      - name: download-model
        image: curlimages/curl:latest
        command:
          - sh
          - -c
          - |
            if [ ! -f /models/qwen.gguf ]; then
              echo "Téléchargement du modèle Qwen 1.5B (environ 1.2 Go)..."
              curl -L -o /models/qwen.gguf \
              "https://huggingface.co/Qwen/Qwen1.5-1.8B-Chat-GGUF/resolve/main/qwen1_5-1_8b-chat-q4_k_m.gguf"
              echo "Téléchargement terminé !"
            else
              echo "Modèle déjà présent, on passe."
            fi
        volumeMounts:
        - name: models
          mountPath: /models
        resources:
          limits:
            memory: "256Mi"
      volumes:
      - name: models
        emptyDir:
          sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-server
  namespace: ai-agent
spec:
  selector:
    app: llm-server
  ports:
  - port: 8000
    targetPort: 8000
