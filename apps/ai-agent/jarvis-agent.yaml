apiVersion: v1
kind: ConfigMap
metadata:
  name: jarvis-script
  namespace: ai-agent
data:
  agent.py: |
    import os
    import re
    import requests
    from kubernetes import client, config
    from kubernetes.client.rest import ApiException

    # ==========================================
    # 1. CONFIGURATION INITIALE
    # ==========================================

    # On charge la configuration K3s depuis l'intérieur du Pod (grâce au ServiceAccount qu'on a créé)
    try:
        config.load_incluster_config()
        v1 = client.CoreV1Api()
        print("✅ Connecté à l'API Kubernetes avec succès !")
    except Exception as e:
        print("❌ Erreur de connexion à K8s (Es-tu sûr de lancer ce script dans un Pod ?)")
        exit(1)

    # L'adresse de ton Pod 1 (le serveur llama.cpp qui hébergera Qwen). 
    # On utilisera le nom du service K8s qu'on créera plus tard.
    LLM_API_URL = "http://llm-server.ai-agent.svc.cluster.local:8000/v1/chat/completions"


    # ==========================================
    # 2. LES OUTILS (Les "bras" de l'IA)
    # ==========================================

    def get_cluster_status():
        """Récupère l'état global de tous les pods du cluster."""
        try:
            pods = v1.list_pod_for_all_namespaces(watch=False)
            status_count = {}
            bad_pods = []
            
            for pod in pods.items:
                state = pod.status.phase
                status_count[state] = status_count.get(state, 0) + 1
                if state not in ['Running', 'Succeeded']:
                    bad_pods.append(f"{pod.metadata.namespace}/{pod.metadata.name} ({state})")
            
            report = f"Résumé: {status_count}. "
            if bad_pods:
                report += f"Pods en erreur: {', '.join(bad_pods)}"
            else:
                report += "Aucun pod en erreur."
            return report
        except ApiException as e:
            return f"Erreur K8s: {e.reason}"

    def get_pod_logs(namespace, pod_name):
        """Récupère les 50 dernières lignes de logs d'un pod."""
        try:
            logs = v1.read_namespaced_pod_log(name=pod_name, namespace=namespace, tail_lines=50)
            return logs if logs else "Le fichier de log est vide."
        except ApiException as e:
            return f"Impossible de lire les logs (Le pod existe-t-il ?) : {e.reason}"

    def get_pod_events(namespace, pod_name):
        """Récupère les événements K8s d'un pod (utile s'il n'a pas de logs)."""
        try:
            # On filtre les événements pour ne garder que ceux du pod concerné
            events = v1.list_namespaced_event(namespace, field_selector=f"involvedObject.name={pod_name}")
            if not events.items:
                return "Aucun événement récent trouvé pour ce pod."
            
            event_msgs = [f"[{e.type}] {e.reason}: {e.message}" for e in events.items[-5:]] # Les 5 derniers
            return "\n".join(event_msgs)
        except ApiException as e:
            return f"Erreur lors de la lecture des événements : {e.reason}"


    # ==========================================
    # 3. LE CERVEAU (La boucle de l'Agent)
    # ==========================================

    SYSTEM_PROMPT = """Tu es Jarvis, l'assistant d'infrastructure K3s de Haerin.
    Tu dois aider à diagnostiquer les problèmes. Tu peux utiliser des outils.

    Si tu as besoin d'utiliser un outil, tu DOIS répondre EXACTEMENT avec ce format et rien d'autre :
    ACTION: nom_de_l_outil|argument1|argument2

    Voici les outils à ta disposition :
    1. ACTION: get_cluster_status
    2. ACTION: get_pod_logs|namespace|nom_du_pod
    3. ACTION: get_pod_events|namespace|nom_du_pod

    Si tu n'as pas besoin d'outil, réponds normalement et de manière concise à l'utilisateur."""

    def ask_jarvis(user_message, conversation_history=None):
        if conversation_history is None:
            conversation_history = [{"role": "system", "content": SYSTEM_PROMPT}]
        
        conversation_history.append({"role": "user", "content": user_message})
        
        print("🤖 Jarvis réfléchit...")
        # On envoie la requête au modèle local Qwen
        payload = {
            "messages": conversation_history,
            "temperature": 0.2, # Température basse = IA très factuelle, moins d'hallucinations
            "max_tokens": 500
        }
        
        try:
            response = requests.post(LLM_API_URL, json=payload).json()
            ai_response = response["choices"][0]["message"]["content"].strip()
        except Exception as e:
            return f"Erreur de communication avec Qwen : {str(e)}"

        # ---------------------------------------------------------
        # INTERCEPTION : L'IA veut-elle utiliser un outil ?
        # ---------------------------------------------------------
        if ai_response.startswith("ACTION:"):
            print(f"⚡ Jarvis demande une action : {ai_response}")
            parts = ai_response.replace("ACTION:", "").strip().split("|")
            tool_name = parts[0]
            
            # Exécution de l'outil approprié par le script Python
            tool_result = ""
            if tool_name == "get_cluster_status":
                tool_result = get_cluster_status()
            elif tool_name == "get_pod_logs" and len(parts) == 3:
                tool_result = get_pod_logs(parts[1], parts[2])
            elif tool_name == "get_pod_events" and len(parts) == 3:
                tool_result = get_pod_events(parts[1], parts[2])
            else:
                tool_result = "Erreur: Outil inconnu ou arguments invalides."
                
            print(f"🔧 Résultat de l'outil obtenu. On renvoie à Jarvis...")
            
            # On ajoute la réponse de l'outil dans l'historique et on relance l'IA
            conversation_history.append({"role": "assistant", "content": ai_response})
            conversation_history.append({"role": "system", "content": f"Résultat de l'outil : {tool_result}\nFormule maintenant ta réponse finale."})
            
            return ask_jarvis("Analyse ce résultat.", conversation_history)
        
        # Si pas d'outil demandé, on affiche la réponse finale
        return ai_response

    # ==========================================
    # 4. MODE INTERACTIF (Le Chat)
    # ==========================================
    if __name__ == "__main__":
        print("=======================================")
        print(" TERMINAL JARVIS - PRET")
        print("=======================================")
        history = [{"role": "system", "content": SYSTEM_PROMPT}]
        
        while True:
            try:
                user_input = input("\n👤 Toi: ")
                if user_input.lower() in ['quit', 'exit']:
                    break
                
                reponse = ask_jarvis(user_input, history)
                print(f"\n🤖 Jarvis: {reponse}")
                
                # On sauvegarde la réponse pour que l'IA ait de la mémoire
                history.append({"role": "assistant", "content": reponse})
                
            except KeyboardInterrupt:
                break

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jarvis-agent
  namespace: ai-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jarvis-agent
  template:
    metadata:
      labels:
        app: jarvis-agent
    spec:
      serviceAccountName: jarvis-sa
      containers:
      - name: jarvis
        image: python:3.11-slim
        command:
          - sh
          - -c
          - |
            pip install kubernetes requests -q
            sleep infinity
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        volumeMounts:
        - name: script
          mountPath: /app
      volumes:
      - name: script
        configMap:
          name: jarvis-script
