apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-agent-allow
  namespace: ai-agent
spec:
  podSelector: {} # Cette règle s'applique à TOUS les pods du namespace ai-agent
  policyTypes:
    - Ingress
    - Egress
  
  # 1. RÈGLES ENTRANTES (Ingress)
  ingress:
    - from:
      - podSelector: {} # Les pods de ce namespace ont le droit de se parler entre eux (Jarvis -> LLM)

  # 2. RÈGLES SORTANTES (Egress)
  egress:
    # Autoriser le DNS (vers kube-system où se trouve CoreDNS)
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
          
    # Autoriser le HTTPS (Internet + API Kubernetes)
    - ports:
      - protocol: TCP
        port: 443
