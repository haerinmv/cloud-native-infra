apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: 9000
    - port: 9001
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
