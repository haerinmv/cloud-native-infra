# bootstrap/infrastructure-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: ci-cd
spec:
  project: default
  source:
    repoURL: https://github.com/haerinmv/cloud-native-infra.git
    targetRevision: HEAD
    path: infrastructure
    directory:
    	recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ci-cd          # gardé pour le fallback
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
  # Permet à ArgoCD de gérer des ressources dans n'importe quel namespace
